<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Horizon Collector Pro | CGJZCZJ</title>
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@700&family=Inter:wght@400;900&display=swap" rel="stylesheet">
    <style>
        :root { --fh-pink: #ff2d55; --fh-yellow: #f2d638; --bg-carbon: #0a0a0c; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: var(--bg-carbon); color: white; font-family: 'Inter', sans-serif; overflow: hidden; }

        /* --- BACKGROUND SYSTEM (RELIABLE LINKS) --- */
        #master-bg { 
            position: fixed; inset: 0; z-index: -1; 
            background-size: cover; background-position: center; 
            filter: brightness(0.4) contrast(1.2); 
            transition: background-image 1s ease-in-out;
            background-color: #111;
        }
        
        /* --- HEADER --- */
        .header { padding: 15px; background: rgba(0,0,0,0.85); border-bottom: 3px solid var(--fh-pink); z-index: 1001; position: relative; }
        .top-nav { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .game-selector { background: #222; padding: 8px 15px; border: 1px solid #444; cursor: pointer; display: flex; align-items: center; gap: 8px; font-weight: 900; }
        .user-title { font-family: 'Oswald', sans-serif; font-size: 1.5rem; color: var(--fh-yellow); font-style: italic; text-transform: uppercase; }
        .gear-btn { font-size: 1.6rem; cursor: pointer; }

        /* --- SEARCH & SORT --- */
        .controls { display: flex; padding: 10px 15px; gap: 10px; background: rgba(0,0,0,0.5); border-bottom: 1px solid #333; }
        input#search { flex: 1; padding: 12px; background: #111; border: 1px solid #444; color: white; }
        select#sort { padding: 10px; background: #333; color: white; border: none; font-family: 'Oswald'; }

        /* --- LIST --- */
        .list-container { height: 75vh; overflow-y: auto; padding: 10px 15px 120px; }
        .car-card { 
            background: rgba(255,255,255,0.05); margin-bottom: 6px; padding: 15px; 
            display: flex; align-items: center; border-left: 6px solid #444; 
            transition: 0.3s; opacity: 0.4; filter: grayscale(1);
        }
        .car-card.owned { opacity: 1; filter: grayscale(0); border-left-color: var(--fh-pink); background: rgba(255,45,85,0.15); }
        .pi-badge { background: #555; padding: 4px 8px; font-weight: 900; font-size: 0.75rem; min-width: 50px; text-align: center; margin-right: 15px; }

        /* --- ANIMATIONS --- */
        #anim-layer { position: fixed; inset: 0; pointer-events: none; z-index: 999; overflow: hidden; }
        .pinata { position: absolute; font-size: 10rem; animation: p-dance 3s linear forwards; top: 35%; left: -250px; }
        @keyframes p-dance { 0% { left: -250px; } 100% { left: 110vw; transform: rotate(45deg); } }
        .leaf { position: absolute; font-size: 5rem; animation: l-drift 6s ease-in-out forwards; top: -100px; }
        @keyframes l-drift { to { top: 110vh; transform: rotate(1080deg); } }

        /* --- MODALS --- */
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.98); z-index: 2000; display: none; flex-direction: column; padding: 30px 20px; overflow-y: auto; }
        .modal.active { display: flex; }
    </style>
</head>
<body>

    <div id="master-bg"></div>
    <div id="anim-layer"></div>

    <div class="header">
        <div class="top-nav">
            <div class="game-selector" onclick="document.getElementById('game-pop').style.display='block'">
                <span>▣</span> <span id="game-name">FH5</span>
            </div>
            <div class="user-title" id="name-display">DRIVER</div>
            <div class="gear-btn" onclick="openSettings()">⚙️</div>
        </div>
        <div id="game-pop" style="display:none; position:absolute; left:15px; top:60px; background:#222; border:1px solid #444; z-index:2001;">
            <div style="padding:15px 30px; border-bottom:1px solid #333" onclick="swapGame('FH4')">FH4</div>
            <div style="padding:15px 30px; border-bottom:1px solid #333" onclick="swapGame('FH5')">FH5</div>
            <div style="padding:15px 30px;" onclick="swapGame('FH6')">FH6</div>
        </div>
        <div style="text-align:center; font-size:0.75rem; color:var(--fh-yellow);">
            COLLECTED: <span id="count-ui">0 / 20</span>
        </div>
    </div>

    <div class="controls">
        <input type="text" id="search" placeholder="Filter by Name or Make..." oninput="updateList()">
        <select id="sort" onchange="updateList()">
            <option value="name">NAME (A-Z)</option>
            <option value="make">MANUFACTURER</option>
            <option value="pi-desc">PI (HIGH-LOW)</option>
            <option value="pi-asc">PI (LOW-HIGH)</option>
            <option value="class">CLASS</option>
            <option value="year">YEAR</option>
        </select>
    </div>

    <div class="list-container" id="car-list"></div>

    <div id="modal-settings" class="modal">
        <div style="text-align:right; font-size:2rem" onclick="closeModals()">X</div>
        <h1 style="font-family:'Oswald'">SETTINGS</h1>
        <label>EDIT NAME</label>
        <input type="text" id="name-input" style="width:100%; padding:15px; margin:10px 0;">
        <button onclick="saveSettings()" style="padding:20px; background:var(--fh-pink); border:none; color:white; font-weight:900;">SAVE</button>
    </div>

    <script>
        let state = JSON.parse(localStorage.getItem('fh_v6_state')) || { 
            name: "", game: 'FH5', owned: [] 
        };

        const carFleet = [
            { id: 1, name: "911 GT3", make: "Porsche", pi: 900, class: "S1", year: 2021 },
            { id: 2, name: "Charger R/T", make: "Dodge", pi: 450, class: "C", year: 1969 },
            { id: 3, name: "F8 Tributo", make: "Ferrari", pi: 885, class: "S1", year: 2020 },
            { id: 4, name: "Supra RZ", make: "Toyota", pi: 620, class: "B", year: 1997 },
            { id: 5, name: "AMG One", make: "Mercedes-AMG", pi: 927, class: "S2", year: 2021 },
            { id: 6, name: "2002 Turbo", make: "BMW", pi: 380, class: "D", year: 1973 },
            { id: 7, name: "Concept Two", make: "Rimac", pi: 998, class: "S2", year: 2019 },
            { id: 8, name: "Escort RS", make: "Ford", pi: 550, class: "B", year: 1992 },
            { id: 9, name: "Huracan", make: "Lamborghini", pi: 820, class: "S1", year: 2015 },
            { id: 10, name: "Hummer EV", make: "GMC", pi: 400, class: "C", year: 2023 },
            { id: 11, name: "Chiron", make: "Bugatti", pi: 999, class: "X", year: 2018 },
            { id: 12, name: "Cobra 427", make: "Shelby", pi: 720, class: "A", year: 1965 },
            { id: 13, name: "R1T", make: "Rivian", pi: 510, class: "B", year: 2022 },
            { id: 14, name: "Silvia K's", make: "Nissan", pi: 490, class: "C", year: 1998 },
            { id: 15, name: "Vulcan", make: "Aston Martin", pi: 980, class: "S2", year: 2017 },
            { id: 16, name: "Regal GNX", make: "Buick", pi: 410, class: "C", year: 1987 },
            { id: 17, name: "LFA", make: "Lexus", pi: 810, class: "S1", year: 2010 },
            { id: 18, name: "Ford Bronco", make: "Hoonigan", pi: 800, class: "A", year: 2021 },
            { id: 19, name: "Bel Air", make: "Chevrolet", pi: 200, class: "D", year: 1957 },
            { id: 20, name: "Evija", make: "Lotus", pi: 990, class: "S2", year: 2024 }
        ];

        window.onload = () => {
            if(!state.name) { state.name = prompt("ENTER GAMERTAG:") || "Driver"; save(); }
            document.getElementById('name-display').innerText = state.name.toUpperCase();
            swapGame(state.game);
        };

        function swapGame(g) {
            state.game = g;
            document.getElementById('game-name').innerText = g;
            document.getElementById('game-pop').style.display = 'none';
            
            // USING DYNAMIC PICSUM SERVICES FOR STABILITY
            const bgs = {
                FH4: 'https://picsum.photos/id/514/1200/800', 
                FH5: 'https://picsum.photos/id/1071/1200/800', 
                FH6: 'https://picsum.photos/id/136/1200/800'
            };
            document.getElementById('master-bg').style.backgroundImage = `url('${bgs[g]}')`;
            
            runAnimations(g);
            updateList();
            save();
        }

        function updateList() {
            const list = document.getElementById('car-list');
            const search = document.getElementById('search').value.toLowerCase();
            const sortVal = document.getElementById('sort').value;
            list.innerHTML = '';

            let filtered = carFleet.filter(c => c.name.toLowerCase().includes(search) || c.make.toLowerCase().includes(search));

            if(sortVal === 'pi-desc') filtered.sort((a,b) => b.pi - a.pi);
            if(sortVal === 'pi-asc') filtered.sort((a,b) => a.pi - b.pi);
            if(sortVal === 'name') filtered.sort((a,b) => a.name.localeCompare(b.name));
            if(sortVal === 'make') filtered.sort((a,b) => a.make.localeCompare(b.make));
            if(sortVal === 'class') filtered.sort((a,b) => a.class.localeCompare(b.class));
            if(sortVal === 'year') filtered.sort((a,b) => b.year - a.year);

            filtered.forEach(car => {
                const owned = state.owned.includes(car.id);
                const card = document.createElement('div');
                card.className = `car-card ${owned ? 'owned' : ''}`;
                card.innerHTML = `<div class="pi-badge">${car.class} ${car.pi}</div><div><b>${car.make}</b> ${car.name}</div>`;
                card.onclick = () => {
                    if(!owned) state.owned.push(car.id);
                    else state.owned = state.owned.filter(id => id !== car.id);
                    save(); updateList();
                };
                list.appendChild(card);
            });
            document.getElementById('count-ui').innerText = `${state.owned.length} / ${carFleet.length}`;
        }

        function runAnimations(g) {
            const layer = document.getElementById('anim-layer');
            layer.innerHTML = '';
            if(g === 'FH5') {
                for(let i=0; i<2; i++) {
                    let p = document.createElement('div'); p.className = 'pinata'; p.innerText = '🪅';
                    p.style.animationDelay = (i * 0.7) + "s"; layer.appendChild(p);
                }
            } else if(g === 'FH4') {
                for(let i=0; i<3; i++) {
                    let l = document.createElement('div'); l.className = 'leaf'; l.innerText = '🍂';
                    l.style.left = (Math.random() * 80) + "vw"; l.style.animationDelay = (i * 1.5) + "s";
                    layer.appendChild(l);
                }
            }
        }

        function openSettings() { document.getElementById('modal-settings').classList.add('active'); }
        function closeModals() { document.querySelectorAll('.modal').forEach(m => m.classList.remove('active')); }
        function saveSettings() { state.name = document.getElementById('name-input').value; save(); location.reload(); }
        function save() { localStorage.setItem('fh_v6_state', JSON.stringify(state)); }
    </script>
</body>
</html>
