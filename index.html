<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Forza Collection | CGJZCZJ</title>
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@700&family=Inter:wght@400;900&display=swap" rel="stylesheet">
    <style>
        :root { --fh-pink: #ff2d55; --fh-yellow: #f2d638; --bg-carbon: #0a0a0c; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: var(--bg-carbon); color: white; font-family: 'Inter', sans-serif; overflow: hidden; }

        /* --- STABLE BACKGROUNDS --- */
        #master-bg { position: fixed; inset: 0; z-index: -1; transition: 1s; }
        .bg-fh4 { background: linear-gradient(135deg, #4e342e 0%, #212121 100%); } /* Autumn */
        .bg-fh5 { background: linear-gradient(135deg, #00695c 0%, #212121 100%); } /* Mexico */
        .bg-fh6 { background: linear-gradient(135deg, #283593 0%, #212121 100%); } /* Japan */

        /* --- WELCOME MODAL --- */
        #modal-welcome { position: fixed; inset: 0; background: var(--bg-carbon); z-index: 3000; display: none; flex-direction: column; justify-content: center; padding: 40px; }
        #modal-welcome.active { display: flex; }

        /* --- HEADER --- */
        .header { padding: 15px; background: rgba(0,0,0,0.95); border-bottom: 3px solid var(--fh-pink); z-index: 1001; position: relative; }
        .top-row { display: flex; justify-content: space-between; align-items: center; }
        .user-title { font-family: 'Oswald', sans-serif; font-size: 1.8rem; color: var(--fh-yellow); font-style: italic; text-transform: uppercase; flex: 1; text-align: center; }
        .game-nav { background: #222; padding: 10px; border: 1px solid #444; font-weight: 900; cursor: pointer; }

        /* --- LIST SYSTEM --- */
        .controls { display: flex; padding: 10px; gap: 10px; background: rgba(0,0,0,0.7); }
        input#search { flex: 1; padding: 12px; background: #111; border: 1px solid #444; color: white; }
        select#sort { padding: 10px; background: #333; color: white; border: none; font-family: 'Oswald'; }
        
        .list-container { height: 70vh; overflow-y: auto; padding: 10px 15px 150px; }
        .car-card { background: rgba(255,255,255,0.05); margin-bottom: 8px; padding: 18px; display: flex; align-items: center; border-left: 8px solid #444; opacity: 0.5; transition: 0.3s; }
        .car-card.owned { opacity: 1; border-left-color: var(--fh-pink); background: rgba(255,45,85,0.2); }
        .pi-badge { background: #444; padding: 5px 10px; margin-right: 15px; font-weight: 900; min-width: 65px; text-align: center; font-size: 0.8rem; }

        /* --- MEGA ANIMATIONS --- */
        #anim-layer { position: fixed; inset: 0; pointer-events: none; z-index: 999; overflow: hidden; }
        .mega-anim { position: absolute; left: -500px; animation: move-h 4s linear forwards; font-size: 15rem; }
        @keyframes move-h { 0% { left: -500px; transform: rotate(0deg); } 100% { left: 120vw; transform: rotate(20deg); } }

        /* --- SETTINGS --- */
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.98); z-index: 2000; display: none; flex-direction: column; padding: 40px 20px; overflow-y: auto; }
        .modal.active { display: flex; }
        .dlc-box { background: #111; padding: 20px; margin: 15px 0; border: 1px solid #333; border-radius: 5px; }
    </style>
</head>
<body>

    <div id="master-bg"></div>
    <div id="anim-layer"></div>

    <div id="modal-welcome" class="active">
        <h1 style="font-family:'Oswald'; color:var(--fh-pink); text-align:center; font-size:2.5rem;">FORZA COLLECTION WELCOMES YOU!</h1>
        <p style="text-align:center; margin-bottom:30px;">Enter your username to begin.</p>
        <input type="text" id="welcome-name" placeholder="Gamertag..." style="width:100%; padding:20px; background:#111; border:1px solid #444; color:white; font-size:1.2rem;">
        <button onclick="startApp()" style="margin-top:20px; padding:20px; background:var(--fh-pink); color:white; border:none; font-weight:900; width:100%;">ENTER GARAGE</button>
    </div>

    <div class="header">
        <div class="top-row">
            <div class="game-nav" onclick="document.getElementById('game-pop').style.display='block'">▣ <span id="game-label">FH5</span></div>
            <div class="user-title" id="name-display">DRIVER</div>
            <div onclick="openSettings()" style="font-size:2rem">⚙️</div>
        </div>
        <div id="game-pop" style="display:none; position:absolute; left:15px; top:65px; background:#222; border:1px solid #444; z-index:2001; width:120px;">
            <div style="padding:15px; border-bottom:1px solid #333" onclick="swapGame('FH4')">FH4</div>
            <div style="padding:15px; border-bottom:1px solid #333" onclick="swapGame('FH5')">FH5</div>
            <div style="padding:15px" onclick="swapGame('FH6')">FH6</div>
        </div>
        <div style="text-align:center; font-size:0.8rem; color:var(--fh-yellow); margin-top:5px;">
            COLLECTION: <span id="stats">0 / 0</span>
        </div>
    </div>

    <div class="controls">
        <input type="text" id="search" placeholder="Search Cars..." oninput="updateList()">
        <select id="sort" onchange="updateList()">
            <option value="name">A-Z</option>
            <option value="make">MANUFACTURER</option>
            <option value="pi">PERFORMANCE</option>
        </select>
    </div>

    <div class="list-container" id="car-list"></div>

    <div id="modal-settings" class="modal">
        <div style="text-align:right; font-size:2rem" onclick="closeModals()">X</div>
        <h1 style="font-family:'Oswald'; color:var(--fh-yellow);">SETTINGS & DLC</h1>
        
        <div class="dlc-box">
            <h3 style="margin-top:0">SELECT YOUR DLCs</h3>
            <label style="display:block; margin:10px 0;"><input type="checkbox" class="dlc-check" data-dlc="LEGO"> FH4: LEGO Speed Champions</label>
            <label style="display:block; margin:10px 0;"><input type="checkbox" class="dlc-check" data-dlc="HW"> FH5: Hot Wheels</label>
            <label style="display:block; margin:10px 0;"><input type="checkbox" class="dlc-check" data-dlc="RA"> FH5: Rally Adventure</label>
            <label style="display:block; margin:10px 0;"><input type="checkbox" class="dlc-check" data-dlc="JDM"> FH6: JDM Legends Pack</label>
        </div>

        <button onclick="saveSettings()" style="padding:20px; background:var(--fh-pink); color:white; border:none; font-weight:900; margin-top:20px;">SAVE CHANGES</button>
    </div>

    <script>
        let state = JSON.parse(localStorage.getItem('fh_v10_state')) || { name: "", game: 'FH5', owned: [], dlcs: [] };

        const carDatabase = [
            { id: 1, name: "911 GT3", make: "Porsche", pi: 900, dlc: null },
            { id: 2, name: "Charger R/T", make: "Dodge", pi: 450, dlc: null },
            { id: 3, name: "Supra RZ", make: "Toyota", pi: 620, dlc: null },
            { id: 4, name: "AMG One", make: "Mercedes-AMG", pi: 927, dlc: null },
            { id: 5, name: "LFA", make: "Lexus", pi: 810, dlc: null },
            { id: 6, name: "Chiron", make: "Bugatti", pi: 999, dlc: null },
            { id: 7, name: "Escort RS", make: "Ford", pi: 550, dlc: null },
            { id: 8, name: "Cobra 427", make: "Shelby", pi: 720, dlc: null },
            { id: 9, name: "Concept Two", make: "Rimac", pi: 998, dlc: null },
            { id: 10, name: "Hummer EV", make: "GMC", pi: 400, dlc: null },
            { id: 101, name: "LEGO Senna", make: "LEGO", pi: 998, dlc: "LEGO" },
            { id: 102, name: "Boneshaker", make: "Hot Wheels", pi: 800, dlc: "HW" },
            { id: 103, name: "Focus RS Rally", make: "Ford", pi: 750, dlc: "RA" },
            { id: 104, name: "Skyline R34", make: "Nissan", pi: 820, dlc: "JDM" }
        ];

        function startApp() {
            const name = document.getElementById('welcome-name').value;
            if(!name) return alert("Enter a name!");
            state.name = name;
            save();
            document.getElementById('modal-welcome').classList.remove('active');
            location.reload();
        }

        window.onload = () => {
            if(state.name) {
                document.getElementById('modal-welcome').classList.remove('active');
                document.getElementById('name-display').innerText = state.name.toUpperCase();
                swapGame(state.game);
            }
        };

        function swapGame(g) {
            state.game = g;
            document.getElementById('game-label').innerText = g;
            document.getElementById('game-pop').style.display = 'none';
            document.getElementById('master-bg').className = g === 'FH4' ? 'bg-fh4' : (g === 'FH5' ? 'bg-fh5' : 'bg-fh6');
            
            const layer = document.getElementById('anim-layer');
            layer.innerHTML = '';
            let emoji = (g === 'FH4') ? '🍂' : (g === 'FH5' ? '🪅' : '🌸');
            for(let i=0; i<2; i++) {
                let d = document.createElement('div'); d.className = 'mega-anim'; d.innerText = emoji;
                d.style.top = (25 + (i * 35)) + "%"; d.style.animationDelay = (i * 0.5) + "s";
                layer.appendChild(d);
            }
            updateList();
            save();
        }

        function updateList() {
            const list = document.getElementById('car-list');
            const search = document.getElementById('search').value.toLowerCase();
            const sortVal = document.getElementById('sort').value;
            list.innerHTML = '';

            let visible = carDatabase.filter(c => c.dlc === null || state.dlcs.includes(c.dlc));
            let filtered = visible.filter(c => c.name.toLowerCase().includes(search) || c.make.toLowerCase().includes(search));

            if(sortVal === 'pi') filtered.sort((a,b) => b.pi - a.pi);
            if(sortVal === 'name') filtered.sort((a,b) => a.name.localeCompare(b.name));
            if(sortVal === 'make') filtered.sort((a,b) => a.make.localeCompare(b.make));

            filtered.forEach(car => {
                const owned = state.owned.includes(car.id);
                const card = document.createElement('div');
                card.className = `car-card ${owned ? 'owned' : ''}`;
                card.innerHTML = `<div class="pi-badge">${car.pi}</div><div><b>${car.make}</b> ${car.name}</div>`;
                card.onclick = () => {
                    if(!owned) state.owned.push(car.id);
                    else state.owned = state.owned.filter(id => id !== car.id);
                    save(); updateList();
                };
                list.appendChild(card);
            });
            document.getElementById('stats').innerText = `${state.owned.length} / ${visible.length}`;
        }

        function openSettings() {
            document.getElementById('modal-settings').classList.add('active');
            document.querySelectorAll('.dlc-check').forEach(cb => cb.checked = state.dlcs.includes(cb.dataset.dlc));
        }

        function saveSettings() {
            state.dlcs = [];
            document.querySelectorAll('.dlc-check:checked').forEach(cb => {
                const d = cb.dataset.dlc;
                state.dlcs.push(d);
                carDatabase.filter(c => c.dlc === d).forEach(c => { if(!state.owned.includes(c.id)) state.owned.push(c.id); });
            });
            save(); location.reload();
        }

        function closeModals() { document.querySelectorAll('.modal').forEach(m => m.classList.remove('active')); }
        function save() { localStorage.setItem('fh_v10_state', JSON.stringify(state)); }
    </script>
</body>
</html>
