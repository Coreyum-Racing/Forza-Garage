<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Horizon Hub V3</title>
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@700&family=Roboto+Mono:wght@400&family=Inter:wght@400;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --fh4-accent: #ff9d00;
            --fh5-accent: #ff2d55;
            --fh6-accent: #ff66cc;
            --bg-dark: #0a0a0c;
            --card-bg: rgba(20, 20, 25, 0.9);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            background: var(--bg-dark); color: white;
            font-family: 'Inter', sans-serif; overflow: hidden;
        }

        /* --- SCREENS --- */
        .screen {
            position: absolute; inset: 0; display: none;
            flex-direction: column; animation: fadeIn 0.5s ease;
        }
        .screen.active { display: flex; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* --- WELCOME OVERLAY --- */
        #welcome-overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.9);
            z-index: 1000; display: none; align-items: center; justify-content: center;
            text-align: center;
        }
        #welcome-text {
            font-family: 'Oswald', sans-serif; font-size: 3rem; font-style: italic;
            text-transform: uppercase; transform: skewX(-10deg);
            animation: zoomFlash 2s forwards;
        }
        @keyframes zoomFlash { 
            0% { transform: scale(0.5) skewX(-10deg); opacity: 0; } 
            20% { transform: scale(1.1) skewX(-10deg); opacity: 1; }
            80% { transform: scale(1) skewX(-10deg); opacity: 1; }
            100% { transform: scale(1.2) skewX(-10deg); opacity: 0; }
        }

        /* --- MAIN MENU --- */
        .main-menu-bg {
            background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), url('https://news.xbox.com/en-us/wp-content/uploads/sites/2/2021/06/ForzaHorizon5_KeyArt_Horizontal_RGB_Final.jpg');
            background-size: cover; background-position: center;
        }

        .menu-container { padding: 40px 20px; display: flex; flex-direction: column; gap: 15px; margin-top: auto; }
        
        .game-btn {
            height: 120px; border-radius: 15px; border: none;
            background-size: cover; background-position: center;
            position: relative; overflow: hidden; cursor: pointer;
            transition: transform 0.2s;
        }
        .game-btn:active { transform: scale(0.95); }
        .game-btn span {
            position: absolute; bottom: 15px; left: 20px;
            font-family: 'Oswald', sans-serif; font-size: 1.8rem; font-style: italic;
            text-shadow: 2px 2px 10px rgba(0,0,0,0.8);
        }

        /* --- WATERMARK --- */
        .watermark {
            position: fixed; bottom: 10px; right: 15px; 
            font-family: 'Roboto Mono', monospace; font-size: 10px;
            opacity: 0.4; pointer-events: none;
        }

        /* --- GAME PAGE --- */
        .header-bar {
            padding: 20px; display: flex; justify-content: space-between; align-items: center;
            background: rgba(0,0,0,0.5); backdrop-filter: blur(10px);
        }
        .stats-top { font-family: 'Oswald', sans-serif; font-size: 1.2rem; }
        .stats-top span { color: var(--fh5-accent); }

        .list-container { flex: 1; overflow-y: auto; padding: 15px; padding-bottom: 100px; }
        
        /* --- CAR CARDS --- */
        .car-card {
            background: var(--card-bg); margin-bottom: 10px; border-radius: 10px;
            padding: 15px; display: flex; justify-content: space-between; align-items: center;
            border-left: 5px solid #444; opacity: 0.6;
        }
        .car-card.owned { border-left-color: var(--fh5-accent); opacity: 1; }
        .car-info h4 { margin: 0; font-size: 1rem; }
        .car-info p { margin: 5px 0 0; font-size: 0.8rem; color: #aaa; }

        /* --- ANIMATIONS (PARTICLES) --- */
        #particle-container { position: fixed; inset: 0; pointer-events: none; z-index: 5; }
        .particle { position: absolute; pointer-events: none; }

        /* --- NAVIGATION DOCK --- */
        .bottom-nav {
            position: fixed; bottom: 20px; left: 20px; right: 20px;
            background: rgba(255,255,255,0.1); backdrop-filter: blur(20px);
            height: 70px; border-radius: 35px; display: flex;
            justify-content: space-around; align-items: center; border: 1px solid rgba(255,255,255,0.1);
        }
        .nav-item { font-size: 1.5rem; cursor: pointer; }

        /* --- MODALS --- */
        .modal {
            position: fixed; inset: 0; background: rgba(0,0,0,0.95);
            display: none; flex-direction: column; padding: 20px; z-index: 2000;
        }

    </style>
</head>
<body>

    <div id="welcome-overlay">
        <div id="welcome-text">Welcome Back, <span id="user-display">Driver</span></div>
    </div>

    <div id="screen-main" class="screen main-menu-bg active">
        <div class="menu-container">
            <h2 id="home-username" style="margin:0; font-family: 'Oswald';">GREETINGS, PLAYER</h2>
            <button class="game-btn" style="background-image: url('https://gamingbolt.com/wp-content/uploads/2018/06/forza-horizon-4-mclaren-senna.jpg');" onclick="goGame('FH4')">
                <span>FORZA HORIZON 4</span>
            </button>
            <button class="game-btn" style="background-image: url('https://news.xbox.com/en-us/wp-content/uploads/sites/2/2021/06/ForzaHorizon5_KeyArt_Horizontal_RGB_Final.jpg');" onclick="goGame('FH5')">
                <span>FORZA HORIZON 5</span>
            </button>
            <button class="game-btn" style="background-image: url('https://images.alphacoders.com/131/1317188.jpeg');" onclick="goGame('FH6')">
                <span>FORZA HORIZON 6</span>
            </button>
        </div>
        <div class="watermark">CGJZCZJ | v3.0.1-MAY26</div>
    </div>

    <div id="screen-game" class="screen">
        <div id="particle-container"></div>
        <div class="header-bar">
            <div id="game-title" style="font-family:'Oswald'; font-style:italic;">FORZA HORIZON 5</div>
            <div class="stats-top"><span id="owned-count">723</span> / <span id="total-count">899</span></div>
        </div>

        <div class="list-container" id="car-list">
            </div>

        <div class="bottom-nav">
            <div class="nav-item" onclick="goMain()">🏠</div>
            <div class="nav-item" onclick="startVoice()">🎤</div>
            <div class="nav-item" onclick="openCamera()">📷</div>
            <div class="nav-item" onclick="openSettings()">⚙️</div>
        </div>
    </div>

    <div id="modal-settings" class="modal">
        <h1 style="font-family:'Oswald'">SETTINGS</h1>
        <label>CHANGE DRIVER NAME:</label>
        <input type="text" id="name-input" style="padding:15px; border-radius:10px; border:none; margin:10px 0;">
        <button onclick="saveName()" style="padding:15px; background:var(--fh5-accent); border:none; color:white; font-weight:bold; border-radius:10px;">SAVE PROFILE</button>
        <button onclick="closeModal()" style="margin-top:auto; padding:15px; background:#333; border:none; color:white; border-radius:10px;">CLOSE</button>
    </div>

    <script>
        // --- DATABASE & STATE ---
        let userData = JSON.parse(localStorage.getItem('fh_hub_data')) || {
            name: "",
            lastPage: "main",
            garage: [] // Array of IDs
        };

        const carDB = {
            FH5: [
                { id: 1, name: "2021 Porsche 911 GT3", pi: "S1 900", val: "225,000" },
                { id: 2, name: "2018 Lamborghini Huracan Performante", pi: "S2 915", val: "275,000" },
                { id: 3, name: "1995 Porsche 911 Carrera 2", pi: "A 800", val: "150,000" }
            ],
            FH4: [{ id: 101, name: "2018 McLaren Senna", pi: "S2 998", val: "1,000,000" }],
            FH6: [{ id: 201, name: "2025 Concept Hypercar", pi: "X 999", val: "???" }]
        };

        let currentGame = "FH5";

        // --- APP LOGIC ---
        window.onload = () => {
            if (!userData.name) {
                let n = prompt("WHAT SHOULD WE CALL YOU? (Gamertag, In-game name, etc)");
                userData.name = n || "Driver";
                saveData();
            }
            showWelcome();
        };

        function showWelcome() {
            document.getElementById('user-display').innerText = userData.name;
            document.getElementById('home-username').innerText = "GREETINGS, " + userData.name.toUpperCase();
            const overlay = document.getElementById('welcome-overlay');
            overlay.style.display = 'flex';
            setTimeout(() => { overlay.style.display = 'none'; }, 2200);
        }

        function goGame(game) {
            currentGame = game;
            document.getElementById('screen-main').classList.remove('active');
            document.getElementById('screen-game').classList.add('active');
            document.getElementById('game-title').innerText = "FORZA HORIZON " + game.slice(-1);
            loadCars();
            startParticles(game);
        }

        function goMain() {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById('screen-main').classList.add('active');
            document.getElementById('particle-container').innerHTML = '';
        }

        function loadCars() {
            const list = document.getElementById('car-list');
            list.innerHTML = '';
            const cars = carDB[currentGame];
            document.getElementById('total-count').innerText = cars.length;
            
            cars.forEach(car => {
                const isOwned = userData.garage.includes(car.id);
                const div = document.createElement('div');
                div.className = `car-card ${isOwned ? 'owned' : ''}`;
                div.innerHTML = `
                    <div class="car-info">
                        <h4>${car.name}</h4>
                        <p>${car.pi} | CR ${car.val}</p>
                    </div>
                    <div>${isOwned ? '✅' : '📦'}</div>
                `;
                div.onclick = () => alert(`MODEL: ${car.name}\nVALUE: ${car.val} CR\nSTOCK PI: ${car.pi}`);
                list.appendChild(div);
            });
        }

        // --- ANIMATIONS ---
        function startParticles(game) {
            const container = document.getElementById('particle-container');
            container.innerHTML = '';
            let emoji = "🌸"; // Default FH6
            if (game === "FH4") emoji = "🍂";
            if (game === "FH5") emoji = "🪅";

            for(let i=0; i<15; i++) {
                let p = document.createElement('div');
                p.className = 'particle';
                p.innerText = emoji;
                p.style.left = Math.random() * 100 + "vw";
                p.style.top = "-50px";
                p.style.fontSize = (Math.random() * 20 + 20) + "px";
                p.style.animation = `fall ${Math.random() * 3 + 2}s linear infinite`;
                container.appendChild(p);
            }
        }

        // --- UTILS ---
        function openSettings() { document.getElementById('modal-settings').style.display = 'flex'; }
        function closeModal() { document.getElementById('modal-settings').style.display = 'none'; }
        function saveName() {
            userData.name = document.getElementById('name-input').value;
            saveData();
            location.reload();
        }
        function saveData() { localStorage.setItem('fh_hub_data', JSON.stringify(userData)); }

        // Placeholder for Voice/Camera
        function startVoice() { alert("Voice Search Active... (Strict Matching Initialized)"); }
        function openCamera() { alert("Camera Active... (Scan car to check off)"); }
    </script>

    <style>
        @keyframes fall {
            to { transform: translateY(110vh) rotate(360deg); }
        }
    </style>
</body>
</html>
