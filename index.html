<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Forza Garage Master | V26 FINAL FIX</title>
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@700&family=Inter:wght@400;900&display=swap" rel="stylesheet">
    <style>
        :root { --fh-pink: #ff2d55; --fh-yellow: #f2d638; --bg-carbon: #0a0a0c; --glass: rgba(255, 255, 255, 0.08); }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: var(--bg-carbon); color: white; font-family: 'Inter', sans-serif; overflow: hidden; }

        /* --- HEADER & NAVIGATION --- */
        .header { padding: 15px; background: #000; border-bottom: 3px solid var(--fh-pink); position: relative; z-index: 100; }
        .top-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .user-title { font-family: 'Oswald', sans-serif; font-size: 1.4rem; color: var(--fh-yellow); font-style: italic; text-transform: uppercase; }
        
        .search-container { display: flex; gap: 8px; margin-top: 5px; }
        .search-input { flex: 1; padding: 12px; border-radius: 12px; border: 1px solid #333; background: #111; color: white; }
        .sort-pill { padding: 10px 15px; background: var(--fh-pink); border-radius: 12px; font-weight: 900; font-size: 0.8rem; border: none; color: white; cursor: pointer; }

        /* --- GAME DROPDOWN --- */
        .dropdown-content { display: none; position: absolute; top: 55px; left: 15px; background: #111; border: 1px solid #444; border-radius: 15px; min-width: 160px; z-index: 500; }
        .dropdown-content div { padding: 15px; border-bottom: 1px solid #222; font-weight: 900; cursor: pointer; }
        .show { display: block !important; }

        /* --- CAR CARDS --- */
        .list-container { height: 70vh; overflow-y: auto; padding: 15px 15px 150px; position: relative; z-index: 10; }
        .car-card { background: var(--glass); border-radius: 20px; margin-bottom: 12px; padding: 20px; border: 1px solid #222; position: relative; }
        .car-card.owned { border-left: 8px solid var(--fh-pink); background: rgba(255, 45, 85, 0.1); }
        .dots-btn { font-size: 2rem; color: var(--fh-yellow); cursor: pointer; position: absolute; right: 15px; top: 15px; z-index: 20; padding: 5px; }

        /* --- HUGE ANIMATIONS --- */
        #fx-container { position: fixed; inset: 0; pointer-events: none; z-index: 9999; overflow: hidden; }
        .particle { position: absolute; font-size: 2rem; animation: fall linear forwards; }
        @keyframes fall { to { transform: translateY(110vh) rotate(360deg); } }

        /* --- OVERLAYS --- */
        .overlay-screen { position: fixed; inset: 0; background: #000; z-index: 8000; display: none; flex-direction: column; align-items: center; justify-content: center; padding: 20px; text-align: center; }
        #tutor-box { position: fixed; bottom: 100px; left: 20px; right: 20px; background: var(--fh-yellow); color: #000; padding: 20px; border-radius: 20px; z-index: 7000; font-weight: 900; display: none; }
        .tutor-highlight { z-index: 7001 !important; border: 4px solid var(--fh-yellow) !important; position: relative; }
        
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.98); z-index: 9000; display: none; flex-direction: column; padding: 40px 20px; }
        .btn-main { width: 100%; padding: 18px; background: var(--fh-pink); border-radius: 12px; border: none; color: white; font-weight: 900; margin-top: 10px; cursor: pointer; text-transform: uppercase; }
    </style>
</head>
<body>

    <div id="fx-container"></div>

    <div id="step-name" class="overlay-screen">
        <h1 style="font-family:'Oswald'; color:var(--fh-yellow);">SIGN IN</h1>
        <input type="text" id="input-name" class="search-input" style="width:80%;" placeholder="DRIVER NAME">
        <button onclick="nextStartup(1)" class="btn-main" style="width:80%;">CONTINUE</button>
    </div>

    <div id="step-dlc" class="overlay-screen">
        <h2 style="font-family:'Oswald';">DLC OWNED?</h2>
        <div style="text-align:left;">
            <label><input type="checkbox" id="check-lego"> FH4 LEGO</label><br><br>
            <label><input type="checkbox" id="check-hw"> FH5 HOT WHEELS</label>
        </div>
        <button onclick="nextStartup(2)" class="btn-main">CONTINUE</button>
    </div>

    <div id="step-alert" class="overlay-screen">
        <div style="background:#111; border:2px solid var(--fh-pink); padding:30px; border-radius:20px;">
            <h2 style="color:var(--fh-yellow); font-family:'Oswald';">BASE GAME</h2>
            <p>Listings are currently Base Game only. Manage DLC in settings.</p>
            <button onclick="finishStartup()" class="btn-main">PROCEED</button>
        </div>
    </div>

    <div class="header">
        <div class="top-row">
            <div id="tutor-game">
                <button class="sort-pill" style="background:#222; border:1px solid #444;" onclick="toggleGameMenu(event)">▣ <span id="game-label">FH5</span></button>
                <div id="game-dropdown" class="dropdown-content">
                    <div onclick="selectGame('FH4')">FH4 (AUTUMN)</div>
                    <div onclick="selectGame('FH5')">FH5 (PIÑATA)</div>
                    <div onclick="selectGame('FH6')">FH6 (NEON)</div>
                </div>
            </div>
            <div class="user-title" id="name-display">DRIVER</div>
            <div id="tutor-settings" style="font-size:2rem; cursor:pointer; padding:10px; z-index:500;" onclick="openSettings()">⚙️</div>
        </div>
        <div class="search-container" id="tutor-search">
            <input type="text" id="search-box" class="search-input" placeholder="Search car name..." oninput="filterCars()">
            <button class="sort-pill" onclick="cycleSort()">SORT: <span id="sort-label">A-Z</span></button>
        </div>
    </div>

    <div class="list-container" id="car-list"></div>

    <div id="tutor-box">
        <p id="tutor-text"></p>
        <button onclick="advanceTutorial()" class="btn-main" style="background:#000; padding:10px;">NEXT</button>
    </div>

    <div id="modal-car" class="modal">
        <div style="text-align:right; font-size:2rem;" onclick="closeModals()">✕</div>
        <h2 id="modal-title" style="font-family:'Oswald'; border-bottom:3px solid var(--fh-pink);"></h2>
        <button id="own-btn" class="btn-main">ADD TO GARAGE</button>
        <button class="btn-main" style="background:#333;">SHARE</button>
    </div>

    <div id="modal-settings" class="modal">
        <div style="text-align:right; font-size:2rem;" onclick="closeModals()">✕</div>
        <h2 style="font-family:'Oswald'; color:var(--fh-pink);">SETTINGS</h2>
        <p>Driver: <span id="set-name-view" style="color:var(--fh-yellow);"></span></p>
        <button class="btn-main" style="background:#444;" onclick="localStorage.clear(); location.reload();">RESET ALL DATA</button>
    </div>

    <script>
        let state = JSON.parse(localStorage.getItem('fh_v26_save')) || { 
            name: "", onboarding: true, game: 'FH5', owned: [], tutorSeen: false, sort: 'AZ' 
        };

        const carData = [
            { id: 1, make: "Porsche", model: "911 GT3", pi: 900, class: "S1", val: 150000 },
            { id: 2, make: "Toyota", model: "Supra RZ", pi: 620, class: "A", val: 38000 },
            { id: 3, make: "Dodge", model: "Charger R/T", pi: 450, class: "B", val: 64000 }
        ];

        window.onload = () => {
            if(state.onboarding) document.getElementById('step-name').style.display = 'flex';
            else init();
        };

        function nextStartup(s) {
            if(s === 1) { state.name = document.getElementById('input-name').value || "Driver"; document.getElementById('step-name').style.display = 'none'; document.getElementById('step-dlc').style.display = 'flex'; }
            if(s === 2) { document.getElementById('step-dlc').style.display = 'none'; document.getElementById('step-alert').style.display = 'flex'; }
        }

        function finishStartup() {
            state.onboarding = false; save();
            document.querySelectorAll('.overlay-screen').forEach(s => s.style.display = 'none');
            init();
        }

        function init() {
            document.getElementById('name-display').innerText = state.name.toUpperCase();
            document.getElementById('game-label').innerText = state.game;
            render();
            if(!state.tutorSeen) startTutorial();
        }

        function render(filtered = carData) {
            const list = document.getElementById('car-list');
            list.innerHTML = '';
            let sorted = [...filtered];
            if(state.sort === 'PI') sorted.sort((a,b) => b.pi - a.pi);
            else if(state.sort === 'VAL') sorted.sort((a,b) => b.val - a.val);
            else sorted.sort((a,b) => a.make.localeCompare(b.make));

            sorted.forEach(c => {
                const isOwned = state.owned.includes(c.id);
                const card = document.createElement('div');
                card.className = `car-card ${isOwned ? 'owned' : ''}`;
                card.id = `car-card-${c.id}`;
                card.innerHTML = `<div class="dots-btn" onclick="openCar(event, ${c.id})">⋮</div><div style="font-weight:900;">${c.make} ${c.model}</div><div style="color:var(--fh-yellow); font-weight:900;">${c.class} ${c.pi}</div>`;
                list.appendChild(card);
            });
        }

        function filterCars() {
            const term = document.getElementById('search-box').value.toLowerCase();
            render(carData.filter(c => `${c.make} ${c.model}`.toLowerCase().includes(term)));
        }

        function cycleSort() {
            const modes = ['AZ', 'PI', 'VAL'];
            state.sort = modes[(modes.indexOf(state.sort) + 1) % 3];
            document.getElementById('sort-label').innerText = state.sort === 'AZ' ? 'A-Z' : (state.sort === 'PI' ? 'PI' : 'VALUE');
            render();
        }

        function toggleGameMenu(e) { e.stopPropagation(); document.getElementById('game-dropdown').classList.toggle('show'); }

        function selectGame(g) {
            state.game = g;
            document.getElementById('game-label').innerText = g;
            triggerHugeAnimation(g);
            document.getElementById('game-dropdown').classList.remove('show');
            save();
        }

        function triggerHugeAnimation(game) {
            const container = document.getElementById('fx-container');
            container.innerHTML = '';
            const emoji = game === 'FH4' ? '🍂' : (game === 'FH5' ? '🪅' : '⚡');
            for(let i=0; i<30; i++) {
                const p = document.createElement('div');
                p.className = 'particle';
                p.innerText = emoji;
                p.style.left = Math.random() * 100 + 'vw';
                p.style.top = '-50px';
                p.style.animationDuration = (Math.random() * 2 + 1) + 's';
                p.style.opacity = Math.random();
                container.appendChild(p);
                setTimeout(() => p.remove(), 3000);
            }
        }

        let tutorStep = 0;
        const tutorData = [
            { id: 'tutor-game', text: "Pick your Horizon game here." },
            { id: 'tutor-search', text: "Search and Sort by PI or Value." },
            { id: 'car-card-1', text: "Tap the dots to add cars to your collection." },
            { id: 'tutor-settings', text: "Settings are here. Tutorial will now vanish so you can click them!" }
        ];

        function startTutorial() { document.getElementById('tutor-box').style.display = 'block'; updateTutor(); }
        function updateTutor() {
            tutorData.forEach(d => document.getElementById(d.id)?.classList.remove('tutor-highlight'));
            const step = tutorData[tutorStep];
            document.getElementById(step.id).classList.add('tutor-highlight');
            document.getElementById('tutor-text').innerText = step.text;
        }

        function advanceTutorial() {
            tutorStep++;
            if(tutorStep >= tutorData.length) {
                document.getElementById('tutor-box').remove(); // KILLS THE BOX COMPLETELY
                tutorData.forEach(d => document.getElementById(d.id)?.classList.remove('tutor-highlight'));
                state.tutorialSeen = true; save();
            } else updateTutor();
        }

        function openCar(e, id) {
            e.stopPropagation();
            const car = carData.find(c => c.id === id);
            document.getElementById('modal-title').innerText = `${car.make} ${car.model}`;
            document.getElementById('own-btn').innerText = state.owned.includes(id) ? "REMOVE" : "ADD TO GARAGE";
            document.getElementById('own-btn').onclick = () => {
                if(state.owned.includes(id)) state.owned = state.owned.filter(i => i !== id);
                else state.owned.push(id);
                save(); render(); closeModals();
            };
            document.getElementById('modal-car').style.display = 'flex';
        }

        function openSettings() {
            document.getElementById('set-name-view').innerText = state.name;
            document.getElementById('modal-settings').style.display = 'flex';
        }

        function closeModals() { document.querySelectorAll('.modal').forEach(m => m.style.display = 'none'); }
        function save() { localStorage.setItem('fh_v26_save', JSON.stringify(state)); }
        window.onclick = () => document.getElementById('game-dropdown').classList.remove('show');
    </script>
</body>
</html>
