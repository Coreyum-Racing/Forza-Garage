<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Forza Collection | CGJZCZJ</title>
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@700&family=Inter:wght@400;900&display=swap" rel="stylesheet">
    <style>
        :root { --fh-pink: #ff2d55; --fh-yellow: #f2d638; --bg-carbon: #0a0a0c; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: var(--bg-carbon); color: white; font-family: 'Inter', sans-serif; overflow: hidden; }

        /* --- BACKGROUNDS --- */
        #master-bg { position: fixed; inset: 0; z-index: -1; background-size: cover; background-position: center; filter: brightness(0.3); transition: 1s; }
        .bg-fh4 { background: linear-gradient(45deg, #5d4037, #2c1e1a); }
        .bg-fh5 { background: linear-gradient(45deg, #00897b, #004d40); }
        .bg-fh6 { background: linear-gradient(45deg, #1a237e, #4a148c); }

        /* --- HEADER --- */
        .header { padding: 15px; background: rgba(0,0,0,0.9); border-bottom: 3px solid var(--fh-pink); z-index: 1001; position: relative; }
        .top-row { display: flex; justify-content: space-between; align-items: center; }
        .user-title { font-family: 'Oswald', sans-serif; font-size: 1.8rem; color: var(--fh-yellow); font-style: italic; text-transform: uppercase; flex: 1; text-align: center; }
        .game-nav { background: #222; padding: 10px; border: 1px solid #444; font-weight: 900; cursor: pointer; }

        /* --- CONTROLS --- */
        .controls { display: flex; padding: 10px; gap: 10px; background: rgba(0,0,0,0.6); }
        input#search { flex: 1; padding: 12px; background: #111; border: 1px solid #444; color: white; }
        select#sort { padding: 10px; background: #333; color: white; border: none; font-family: 'Oswald'; }

        /* --- LIST --- */
        .list-container { height: 70vh; overflow-y: auto; padding: 10px 15px 150px; }
        .car-card { background: rgba(255,255,255,0.05); margin-bottom: 8px; padding: 18px; display: flex; align-items: center; border-left: 8px solid #444; opacity: 0.4; filter: grayscale(1); transition: 0.3s; }
        .car-card.owned { opacity: 1; filter: grayscale(0); border-left-color: var(--fh-pink); background: rgba(255,45,85,0.15); }
        .pi-badge { background: #555; padding: 5px 10px; margin-right: 15px; font-weight: 900; min-width: 65px; text-align: center; }

        /* --- ANIMATIONS --- */
        #anim-layer { position: fixed; inset: 0; pointer-events: none; z-index: 999; overflow: hidden; }
        .mega-anim { position: absolute; left: -400px; animation: move-h 4s linear forwards; font-size: 15rem; }
        @keyframes move-h { 0% { left: -400px; transform: rotate(0deg); } 100% { left: 115vw; transform: rotate(20deg); } }

        /* --- MODALS --- */
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.98); z-index: 2000; display: none; flex-direction: column; padding: 40px 20px; overflow-y: auto; }
        .modal.active { display: flex; }
        .dlc-section { background: #111; padding: 15px; margin: 10px 0; border: 1px solid #333; }
        .dlc-section h4 { margin: 0 0 10px 0; color: var(--fh-yellow); font-family: 'Oswald'; }
    </style>
</head>
<body>

    <div id="master-bg"></div>
    <div id="anim-layer"></div>

    <div id="modal-welcome" class="modal">
        <h1 style="font-family:'Oswald'; color:var(--fh-pink); text-align:center;">FORZA COLLECTION WELCOMES YOU!</h1>
        <p style="text-align:center;">Enter your username to begin your journey.</p>
        <input type="text" id="welcome-name" placeholder="Gamertag..." style="width:100%; padding:20px; font-size:1.2rem; background:#111; border:1px solid #444; color:white; margin:20px 0;">
        <button onclick="firstTimeSetup()" style="padding:20px; background:var(--fh-pink); color:white; font-weight:900; border:none; font-size:1.1rem;">ENTER GARAGE</button>
    </div>

    <div class="header">
        <div class="top-row">
            <div class="game-nav" onclick="document.getElementById('game-pop').style.display='block'">▣ <span id="game-label">FH5</span></div>
            <div class="user-title" id="name-display">DRIVER</div>
            <div style="font-size:1.8rem" onclick="openSettings()">⚙️</div>
        </div>
        <div id="game-pop" style="display:none; position:absolute; left:15px; top:65px; background:#222; border:1px solid #444; z-index:2001; width:120px;">
            <div style="padding:15px; border-bottom:1px solid #333" onclick="swapGame('FH4')">FH4</div>
            <div style="padding:15px; border-bottom:1px solid #333" onclick="swapGame('FH5')">FH5</div>
            <div style="padding:15px" onclick="swapGame('FH6')">FH6</div>
        </div>
        <div style="text-align:center; font-size:0.8rem; color:var(--fh-yellow); padding-top:5px;">
            COLLECTION: <span id="stats">0 / 0</span>
        </div>
    </div>

    <div class="controls">
        <input type="text" id="search" placeholder="Search Cars..." oninput="updateList()">
        <select id="sort" onchange="updateList()">
            <option value="name">A-Z</option>
            <option value="make">MAKE</option>
            <option value="pi">PI</option>
        </select>
    </div>

    <div class="list-container" id="car-list"></div>

    <div id="modal-settings" class="modal">
        <div style="text-align:right; font-size:2rem" onclick="closeModals()">X</div>
        <h1 style="font-family:'Oswald'">SETTINGS & DLC</h1>
        
        <div class="dlc-section">
            <h4>MANAGE EXPANSIONS</h4>
            <p style="font-size:0.8rem; color:#888;">Selecting a DLC adds all its cars to your collection automatically.</p>
            <label><input type="checkbox" class="dlc-check" data-dlc="LEGO"> FH4: LEGO Speed Champions</label><br><br>
            <label><input type="checkbox" class="dlc-check" data-dlc="HW"> FH5: Hot Wheels</label><br><br>
            <label><input type="checkbox" class="dlc-check" data-dlc="RA"> FH5: Rally Adventure</label><br><br>
            <label><input type="checkbox" class="dlc-check" data-dlc="JDM"> FH6: JDM Car Pack</label>
        </div>

        <button onclick="saveSettings()" style="padding:20px; background:var(--fh-pink); color:white; font-weight:900; border:none; margin-top:20px;">SAVE CHANGES</button>
    </div>

    <script>
        let state = JSON.parse(localStorage.getItem('fh_v9_state')) ||
