<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Horizon Collector | CGJZCZJ</title>
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@700&family=Inter:wght@400;900&display=swap" rel="stylesheet">
    <style>
        :root { --fh-pink: #ff2d55; --fh-yellow: #f2d638; --bg-carbon: #0a0a0c; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            background: var(--bg-carbon); color: white;
            font-family: 'Inter', sans-serif; overflow: hidden;
        }

        /* --- BACKGROUND --- */
        #master-bg {
            position: fixed; inset: 0; z-index: -1;
            background-size: cover; background-position: center;
            filter: brightness(0.3) blur(8px);
            background-image: url('https://news.xbox.com/en-us/wp-content/uploads/sites/2/2021/06/ForzaHorizon5_KeyArt_Horizontal_RGB_Final.jpg');
        }

        /* --- HEADER --- */
        .header {
            position: relative; padding: 15px; display: flex; flex-direction: column; align-items: center;
            background: linear-gradient(to bottom, rgba(0,0,0,0.9), transparent);
        }
        .nav-trigger { position: absolute; left: 15px; top: 20px; font-size: 1.5rem; cursor: pointer; }
        .user-name { font-family: 'Oswald', sans-serif; font-size: 1.2rem; text-transform: uppercase; font-style: italic; }
        .gear-icon { position: absolute; right: 65px; top: 18px; font-size: 1.4rem; cursor: pointer; }
        #plus-btn { 
            position: absolute; right: 15px; top: 55px; width: 40px; height: 40px; 
            background: var(--fh-pink); border-radius: 50%; display: flex; 
            align-items: center; justify-content: center; font-weight: 900; cursor: pointer;
        }

        /* --- DROPDOWN --- */
        #game-dropdown {
            position: absolute; top: 50px; left: 15px; background: #222; 
            display: none; flex-direction: column; z-index: 500; border: 1px solid #444;
        }
        .drop-item { padding: 15px 30px; font-family: 'Oswald'; border-bottom: 1px solid #333; cursor: pointer; }

        /* --- LIST --- */
        .list-container { flex: 1; overflow-y: auto; padding: 10px 20px 100px; height: 80vh; }
        .car-card {
            background: rgba(255,255,255,0.05); margin-bottom: 5px; padding: 12px;
            display: flex; align-items: center; border-left: 4px solid #444;
            opacity: 0.4; filter: grayscale(1); transition: 0.3s;
        }
        .car-card.owned { opacity: 1; filter: grayscale(0); border-left-color: var(--fh-pink); }
        .pi-badge { background: #444; padding: 5px; font-weight: 900; font-size: 0.7rem; margin-right: 15px; min-width: 45px; text-align: center; }

        /* --- ANIMATIONS --- */
        #anim-layer { position: fixed; inset: 0; pointer-events: none; z-index: 1000; }
        .pinata { position: absolute; font-size: 8rem; top: 40%; transition: 2s linear; left: -150px; }
        .leaf { position: absolute; font-size: 4rem; transition: 2s ease-out; top: -100px; }

        /* --- MODALS --- */
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 2000; display: none; flex-direction: column; padding: 40px 20px; }
        .modal.active { display: flex; }
        .check-item { display: flex; align-items: center; gap: 15px; margin-bottom: 15px; background: #222; padding: 15px; }
        .close-x { position: absolute; top: 20px; right: 20px; font-size: 2rem; font-weight: 900; }

    </style>
</head>
<body>

    <div id="master-bg"></div>
    <div id="anim-layer"></div>

    <div class="header">
        <div class="nav-trigger" onclick="toggleDropdown()">▣</div>
        <div class="user-name" id="display-name">GAMERTAG</div>
        <div class="gear-icon" onclick="openSettings()">⚙️</div>
        <div id="plus-btn" onclick="openAddMenu()">+</div>
        
        <div id="game-dropdown">
            <div class="drop-item" onclick="changeGame('FH4')">FH4</div>
            <div class="drop-item" onclick="changeGame('FH5')">FH5</div>
            <div class="drop-item" onclick="changeGame('FH6')">FH6</div>
        </div>

        <div style="margin-top: 10px; font-size: 0.8rem; color: var(--fh-yellow);" id="game-title">FORZA HORIZON 5</div>
        <div style="font-size: 0.7rem; opacity: 0.8;">COLLECTION: <span id="count">0 / 899</span></div>
    </div>

    <div class="list-container" id="master-list"></div>

    <div id="modal-settings" class="modal">
        <div class="close-x" onclick="closeModals()">X</div>
        <h1 style="font-family:'Oswald'">SETTINGS</h1>
        <label>NEW USERNAME:</label>
        <input type="text" id="name-input" style="width:100%; padding:15px; background:#111; color:white; border:1px solid #444; margin: 10px 0;">
        
        <h3 style="font-family:'Oswald'; margin-top:30px;">DLC CHECKLIST</h3>
        <div id="dlc-container">
            <div class="check-item"><input type="checkbox" id="dlc1"> <label>FH5: Hot Wheels</label></div>
            <div class="check-item"><input type="checkbox" id="dlc2"> <label>FH5: Rally Adventure</label></div>
            <div class="check-item"><input type="checkbox" id="dlc3"> <label>FH5: Welcome Pack</label></div>
        </div>
        <button style="background:var(--fh-pink); color:white; border:none; padding:20px; margin-top:auto; font-weight:900;" onclick="saveSettings()">SAVE & UPDATE</button>
    </div>

    <script>
        let state = JSON.parse(localStorage.getItem('collector_state')) || {
            name: "", game: 'FH5', owned: [], dlcs: []
        };

        const carData = Array.from({length: 899}, (_, i) => ({
            id: i, name: `Car Model #${i + 1}`, pi: "S1 900", val: "250,000"
        }));

        window.onload = () => {
            if(!state.name) {
                state.name = prompt("WHAT IS YOUR GAMERTAG?") || "Driver";
                save();
            }
            document.getElementById('display-name').innerText = state.name;
            changeGame(state.game);
        };

        function changeGame(g) {
            state.game = g;
            document.getElementById('game-title').innerText = "FORZA HORIZON " + g.slice(-1);
            document.getElementById('game-dropdown').style.display = 'none';
            runAnim(g);
            render();
            save();
        }

        function runAnim(g) {
            const layer = document.getElementById('anim-layer');
            layer.innerHTML = '';
            if(g === 'FH5') {
                for(let i=0; i<2; i++) {
                    let p = document.createElement('div'); p.className = 'pinata'; p.innerText = '🪅';
                    p.style.top = (30 + (i*20)) + "%"; layer.appendChild(p);
                    setTimeout(() => { p.style.left = "110vw"; }, 100);
                }
            } else if (g === 'FH4') {
                for(let i=0; i<5; i++) {
                    let l = document.createElement('div'); l.className = 'leaf'; l.innerText = '🍂';
                    l.style.left = (Math.random() * 80) + "vw"; layer.appendChild(l);
                    setTimeout(() => { l.style.top = "110vh"; l.style.left = (Math.random() * 100) + "vw"; }, 100);
                }
            }
            setTimeout(() => { layer.innerHTML = ''; }, 2100);
        }

        function render() {
            const list = document.getElementById('master-list');
            list.innerHTML = '';
            carData.forEach(car => {
                const isOwned = state.owned.includes(car.id);
                const div = document.createElement('div');
                div.className = `car-card ${isOwned ? 'owned' : ''}`;
                div.innerHTML = `<div class="pi-badge">${car.pi}</div><div>${car.name}</div>`;
                div.onclick = () => {
                    if(!isOwned) state.owned.push(car.id);
                    else state.owned = state.owned.filter(id => id !== car.id);
                    save(); render();
                };
                list.appendChild(div);
            });
            document.getElementById('count').innerText = `${state.owned.length} / 899`;
        }

        function toggleDropdown() { 
            const d = document.getElementById('game-dropdown');
            d.style.display = (d.style.display === 'flex') ? 'none' : 'flex';
        }

        function openSettings() { document.getElementById('modal-settings').classList.add('active'); document.getElementById('name-input').value = state.name; }
        function closeModals() { document.querySelectorAll('.modal').forEach(m => m.classList.remove('active')); }
        function saveSettings() { state.name = document.getElementById('name-input').value; save(); location.reload(); }
        function save() { localStorage.setItem('collector_state', JSON.stringify(state)); }
        function openAddMenu() { alert("Plus Menu: Voice, Camera, Keyboard coming soon!"); }
    </script>
</body>
</html>
