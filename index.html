<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Forza Garage | V23 Clean Build</title>
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@700&family=Inter:wght@400;900&display=swap" rel="stylesheet">
    <style>
        :root { --fh-pink: #ff2d55; --fh-yellow: #f2d638; --bg-carbon: #0f0f11; --glass: rgba(255, 255, 255, 0.05); }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: var(--bg-carbon); color: white; font-family: 'Inter', sans-serif; overflow: hidden; }

        /* --- UI ELEMENTS --- */
        .header { padding: 15px; background: #000; border-bottom: 3px solid var(--fh-pink); position: relative; z-index: 1001; }
        .top-row { display: flex; justify-content: space-between; align-items: center; }
        .user-title { font-family: 'Oswald', sans-serif; font-size: 1.6rem; color: var(--fh-yellow); font-style: italic; text-transform: uppercase; }
        
        /* --- GAME DROPDOWN --- */
        .dropdown { position: relative; }
        .dropdown-content { display: none; position: absolute; top: 50px; left: 0; background: #222; border: 1px solid #444; border-radius: 10px; min-width: 120px; z-index: 2000; box-shadow: 0 10px 20px rgba(0,0,0,0.5); }
        .dropdown-content div { padding: 15px; border-bottom: 1px solid #333; font-weight: 900; cursor: pointer; }
        .dropdown-content div:last-child { border-bottom: none; }
        .show { display: block; }

        /* --- CAR CARDS --- */
        .list-container { height: 75vh; overflow-y: auto; padding: 15px 15px 150px; }
        .car-card { background: var(--glass); border-radius: 20px; margin-bottom: 15px; padding: 20px; border: 1px solid #333; position: relative; }
        .car-card.owned { border-left: 8px solid var(--fh-pink); background: rgba(255, 45, 85, 0.05); }
        .dots-btn { font-size: 1.8rem; color: var(--fh-yellow); cursor: pointer; position: absolute; right: 15px; top: 15px; padding: 5px; }

        /* --- OVERLAYS --- */
        .overlay-screen { position: fixed; inset: 0; background: #000; z-index: 5000; display: none; flex-direction: column; align-items: center; justify-content: center; padding: 20px; text-align: center; }
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.98); z-index: 6000; display: none; flex-direction: column; padding: 40px 20px; }
        .modal.active { display: flex; }
        .btn-main { width: 100%; padding: 20px; background: var(--fh-pink); border-radius: 15px; border: none; color: white; font-weight: 900; margin-top: 15px; text-transform: uppercase; cursor: pointer; }
        
        input { width: 100%; padding: 15px; border-radius: 12px; border: 1px solid #444; background: #222; color: white; font-size: 1rem; margin-top: 10px; }
    </style>
</head>
<body>

    <div id="step-name" class="overlay-screen">
        <h1 style="font-family:'Oswald'; color:var(--fh-yellow);">LOGIN</h1>
        <input type="text" id="input-name" placeholder="DRIVER NAME">
        <button onclick="nextStartup(1)" class="btn-main">CONTINUE</button>
    </div>

    <div id="step-dlc" class="overlay-screen">
        <h2 style="font-family:'Oswald';">EXPANSIONS</h2>
        <div style="text-align:left; margin-bottom: 20px;">
            <label><input type="checkbox" id="check-lego" style="width:auto;"> FH4 LEGO CHAMPIONS</label><br><br>
            <label><input type="checkbox" id="check-hw" style="width:auto;"> FH5 HOT WHEELS</label>
        </div>
        <button onclick="nextStartup(2)" class="btn-main">FINALIZE</button>
    </div>

    <div id="step-alert" class="overlay-screen">
        <div style="background:#111; border:2px solid var(--fh-pink); padding:30px; border-radius:20px;">
            <h2 style="color:var(--fh-yellow); font-family:'Oswald';">ALERT</h2>
            <p>Listings reflect BASE GAME only. Toggle DLC in Settings.</p>
            <button onclick="finishStartup()" class="btn-main">ENTER GARAGE</button>
        </div>
    </div>

    <div class="header">
        <div class="top-row">
            <div class="dropdown">
                <button class="btn-main" style="margin:0; padding:10px 15px; background:#222;" onclick="toggleGameMenu()">▣ <span id="game-label">FH5</span></button>
                <div id="game-dropdown" class="dropdown-content">
                    <div onclick="selectGame('FH4')">FH4</div>
                    <div onclick="selectGame('FH5')">FH5</div>
                    <div onclick="selectGame('FH6')">FH6</div>
                </div>
            </div>
            <div class="user-title" id="name-display">DRIVER</div>
            <div style="font-size:1.8rem; cursor:pointer;" onclick="openSettings()">⚙️</div>
        </div>
    </div>

    <div class="list-container" id="car-list"></div>

    <div id="modal-car" class="modal">
        <div style="text-align:right; font-size:2rem;" onclick="closeModals()">✕</div>
        <h2 id="modal-title" style="font-family:'Oswald'; border-bottom: 3px solid var(--fh-pink);"></h2>
        <button id="own-btn" class="btn-main">ADD TO GARAGE</button>
        <button class="btn-main" style="background:#333;" onclick="alert('Copied!')">SHARE</button>
    </div>

    <div id="modal-settings" class="modal">
        <div style="text-align:right; font-size:2rem;" onclick="closeModals()">✕</div>
        <h2 style="font-family:'Oswald'; color:var(--fh-pink);">SETTINGS</h2>
        <p>Driver: <span id="set-name-view" style="color:var(--fh-yellow);"></span></p>
        <button class="btn-main" style="background:#444;" onclick="resetApp()">RESET ALL DATA</button>
    </div>

    <script>
        let state = JSON.parse(localStorage.getItem('fh_v23_save')) || { 
            name: "", onboarding: true, game: 'FH5', owned: [] 
        };

        const cars = [
            { id: 1, make: "Porsche", model: "911 GT3", pi: 900, class: "S1" },
            { id: 2, make: "Toyota", model: "Supra RZ", pi: 620, class: "A" },
            { id: 3, make: "Dodge", model: "Charger R/T", pi: 450, class: "B" }
        ];

        window.onload = () => {
            if(state.onboarding) document.getElementById('step-name').style.display = 'flex';
            else init();
        };

        function nextStartup(s) {
            if(s === 1) {
                state.name = document.getElementById('input-name').value || "Driver";
                document.getElementById('step-name').style.display = 'none';
                document.getElementById('step-dlc').style.display = 'flex';
            }
            if(s === 2) {
                document.getElementById('step-dlc').style.display = 'none';
                document.getElementById('step-alert').style.display = 'flex';
            }
        }

        function finishStartup() {
            state.onboarding = false; save();
            document.querySelectorAll('.overlay-screen').forEach(s => s.style.display = 'none');
            init();
        }

        function init() {
            document.getElementById('name-display').innerText = state.name.toUpperCase();
            document.getElementById('game-label').innerText = state.game;
            render();
        }

        function render() {
            const list = document.getElementById('car-list');
            list.innerHTML = '';
            cars.forEach(c => {
                const isOwned = state.owned.includes(c.id);
                const card = document.createElement('div');
                card.className = `car-card ${isOwned ? 'owned' : ''}`;
                card.innerHTML = `
                    <div class="dots-btn" onclick="openCar(${c.id})">⋮</div>
                    <div style="font-weight:900; font-size:1.2rem;">${c.make} ${c.model}</div>
                    <div style="color:var(--fh-yellow); font-weight:900;">${c.class} ${c.pi}</div>
                `;
                list.appendChild(card);
            });
        }

        function toggleGameMenu() { document.getElementById('game-dropdown').classList.toggle('show'); }
        function selectGame(g) { state.game = g; document.getElementById('game-label').innerText = g; toggleGameMenu(); save(); }

        function openCar(id) {
            const car = cars.find(c => c.id === id);
            document.getElementById('modal-title').innerText = `${car.make} ${car.model}`;
            document.getElementById('own-btn').innerText = state.owned.includes(id) ? "REMOVE" : "ADD TO GARAGE";
            document.getElementById('own-btn').onclick = () => {
                if(state.owned.includes(id)) state.owned = state.owned.filter(i => i !== id);
                else state.owned.push(id);
                save(); render(); closeModals();
            };
            document.getElementById('modal-car').classList.add('active');
        }

        function openSettings() {
            document.getElementById('set-name-view').innerText = state.name;
            document.getElementById('modal-settings').classList.add('active');
        }

        function closeModals() { document.querySelectorAll('.modal').forEach(m => m.classList.remove('active')); }
        function resetApp() { localStorage.removeItem('fh_v23_save'); location.reload(); }
        function save() { localStorage.setItem('fh_v23_save', JSON.stringify(state)); }
        
        // Close dropdown if user clicks outside
        window.onclick = function(event) {
            if (!event.target.matches('.btn-main')) {
                const dropdowns = document.getElementsByClassName("dropdown-content");
                for (let i = 0; i < dropdowns.length; i++) {
                    if (dropdowns[i].classList.contains('show')) dropdowns[i].classList.remove('show');
                }
            }
        }
    </script>
</body>
</html>
