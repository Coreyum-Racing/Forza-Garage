<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Forza Garage Master | V24 Restoration</title>
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@700&family=Inter:wght@400;900&display=swap" rel="stylesheet">
    <style>
        :root { --fh-pink: #ff2d55; --fh-yellow: #f2d638; --bg-carbon: #0f0f11; --glass: rgba(255, 255, 255, 0.08); }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: var(--bg-carbon); color: white; font-family: 'Inter', sans-serif; overflow: hidden; }

        /* --- UI ELEMENTS --- */
        .header { padding: 15px; background: #000; border-bottom: 3px solid var(--fh-pink); position: relative; z-index: 1001; transition: 0.5s; }
        .top-row { display: flex; justify-content: space-between; align-items: center; }
        .user-title { font-family: 'Oswald', sans-serif; font-size: 1.6rem; color: var(--fh-yellow); font-style: italic; text-transform: uppercase; }
        
        /* --- GAME DROPDOWN --- */
        .dropdown-content { display: none; position: absolute; top: 50px; left: 0; background: #111; border: 1px solid #444; border-radius: 15px; min-width: 150px; z-index: 2000; }
        .dropdown-content div { padding: 15px; border-bottom: 1px solid #222; font-weight: 900; cursor: pointer; }
        .show { display: block; animation: slideDown 0.3s ease-out; }
        @keyframes slideDown { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }

        /* --- CAR CARDS --- */
        .list-container { height: 75vh; overflow-y: auto; padding: 15px 15px 150px; }
        .car-card { background: var(--glass); border-radius: 25px; margin-bottom: 15px; padding: 25px; border: 1px solid #333; position: relative; transition: transform 0.3s; }
        .car-card.owned { border-left: 10px solid var(--fh-pink); background: rgba(255, 45, 85, 0.1); }
        .dots-btn { font-size: 2rem; color: var(--fh-yellow); cursor: pointer; position: absolute; right: 20px; top: 20px; }

        /* --- ANIMATIONS & OVERLAYS --- */
        .overlay-screen { position: fixed; inset: 0; background: #000; z-index: 8000; display: none; flex-direction: column; align-items: center; justify-content: center; padding: 20px; text-align: center; }
        .welcome-flash { font-family: 'Oswald'; font-size: 3rem; font-style: italic; text-transform: uppercase; color: white; animation: flashScale 2s ease-out forwards; }
        @keyframes flashScale { 0% { opacity:0; transform: scale(0.5); } 30% { opacity:1; transform: scale(1); color: var(--fh-yellow); } 100% { opacity:0; transform: scale(1.2); } }
        
        /* --- TRANSITION EFFECTS --- */
        #fx-layer { position: fixed; inset: 0; pointer-events: none; z-index: 9000; display: none; background: rgba(255, 45, 85, 0.3); animation: screenFlash 0.5s ease-out forwards; }
        @keyframes screenFlash { 0% { opacity: 1; } 100% { opacity: 0; } }

        /* --- TUTORIAL --- */
        #tutor-box { position: fixed; bottom: 120px; left: 20px; right: 20px; background: var(--fh-yellow); color: #000; padding: 25px; border-radius: 20px; z-index: 10000; font-weight: 900; display: none; box-shadow: 0 10px 40px rgba(0,0,0,0.8); }
        .tutor-highlight { z-index: 10001 !important; border: 5px solid var(--fh-yellow) !important; position: relative; }

        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.98); z-index: 11000; display: none; flex-direction: column; padding: 40px 20px; }
        .btn-main { width: 100%; padding: 20px; background: var(--fh-pink); border-radius: 15px; border: none; color: white; font-weight: 900; margin-top: 15px; cursor: pointer; }
    </style>
</head>
<body>

    <div id="fx-layer"></div>

    <div id="step-name" class="overlay-screen">
        <h1 style="font-family:'Oswald'; color:var(--fh-yellow);">START ENGINE</h1>
        <input type="text" id="input-name" style="width:80%; padding:20px; border-radius:15px;" placeholder="DRIVER NAME">
        <button onclick="nextStartup(1)" class="btn-main" style="width:80%;">NEXT</button>
    </div>

    <div id="step-dlc" class="overlay-screen">
        <h2 style="font-family:'Oswald';">SELECT DLC PACKS</h2>
        <div style="text-align:left; font-size:1.2rem;">
            <label><input type="checkbox" id="check-lego" style="transform:scale(1.5);"> FH4: LEGO Champions</label><br><br>
            <label><input type="checkbox" id="check-hw" style="transform:scale(1.5);"> FH5: Hot Wheels</label>
        </div>
        <button onclick="nextStartup(2)" class="btn-main">CONTINUE</button>
    </div>

    <div id="step-alert" class="overlay-screen">
        <div style="background:#111; border:3px solid var(--fh-pink); padding:30px; border-radius:25px;">
            <h2 style="color:var(--fh-yellow); font-family:'Oswald';">ALERT</h2>
            <p>Garages show BASE GAME by default. Manage DLCs in settings.</p>
            <button onclick="finishStartup()" class="btn-main">I UNDERSTAND</button>
        </div>
    </div>

    <div id="welcome-screen" class="overlay-screen">
        <div class="welcome-flash" id="welcome-text">WELCOME</div>
    </div>

    <div class="header" id="header">
        <div class="top-row">
            <div id="tutor-game" class="dropdown">
                <button class="btn-main" style="margin:0; padding:10px 15px; background:#222; border:1px solid #444;" onclick="toggleGameMenu()">▣ <span id="game-label">FH5</span></button>
                <div id="game-dropdown" class="dropdown-content">
                    <div onclick="selectGame('FH4')">FH4</div>
                    <div onclick="selectGame('FH5')">FH5</div>
                    <div onclick="selectGame('FH6')">FH6</div>
                </div>
            </div>
            <div class="user-title" id="name-display">DRIVER</div>
            <div id="tutor-settings" style="font-size:1.8rem; cursor:pointer;" onclick="openSettings()">⚙️</div>
        </div>
    </div>

    <div class="list-container" id="car-list"></div>

    <div id="tutor-box">
        <p id="tutor-text"></p>
        <button onclick="advanceTutorial()" class="btn-main" style="background:#000; padding:10px;">GOT IT</button>
    </div>

    <div id="modal-car" class="modal" style="display:none; flex-direction:column;">
        <div style="text-align:right; font-size:2rem;" onclick="closeModals()">✕</div>
        <h2 id="modal-title" style="font-family:'Oswald'; border-bottom:3px solid var(--fh-pink);"></h2>
        <button id="own-btn" class="btn-main">ADD TO GARAGE</button>
        <button class="btn-main" style="background:#333;" onclick="alert('Copied!')">SHARE</button>
    </div>

    <script>
        let state = JSON.parse(localStorage.getItem('fh_v24_save')) || { 
            name: "", onboarding: true, game: 'FH5', owned: [], tutorialSeen: false 
        };

        const cars = [
            { id: 1, make: "Porsche", model: "911 GT3", pi: 900, class: "S1" },
            { id: 2, make: "Toyota", model: "Supra RZ", pi: 620, class: "A" }
        ];

        window.onload = () => {
            if(state.onboarding) document.getElementById('step-name').style.display = 'flex';
            else showWelcome();
        };

        function nextStartup(s) {
            if(s === 1) { state.name = document.getElementById('input-name').value || "Driver"; document.getElementById('step-name').style.display = 'none'; document.getElementById('step-dlc').style.display = 'flex'; }
            if(s === 2) { document.getElementById('step-dlc').style.display = 'none'; document.getElementById('step-alert').style.display = 'flex'; }
        }

        function finishStartup() {
            state.onboarding = false; save();
            document.querySelectorAll('.overlay-screen').forEach(s => s.style.display = 'none');
            showWelcome();
        }

        function showWelcome() {
            const screen = document.getElementById('welcome-screen');
            document.getElementById('welcome-text').innerText = `WELCOME ${state.name.toUpperCase()}`;
            screen.style.display = 'flex';
            setTimeout(() => { screen.style.display = 'none'; init(); }, 2000);
        }

        function init() {
            document.getElementById('name-display').innerText = state.name.toUpperCase();
            document.getElementById('game-label').innerText = state.game;
            render();
            if(!state.tutorialSeen) startTutorial();
        }

        function render() {
            const list = document.getElementById('car-list');
            list.innerHTML = '';
            cars.forEach(c => {
                const isOwned = state.owned.includes(c.id);
                const card = document.createElement('div');
                card.className = `car-card ${isOwned ? 'owned' : ''}`;
                card.id = `car-card-${c.id}`;
                card.innerHTML = `<div class="dots-btn" onclick="openCar(${c.id})">⋮</div><div style="font-weight:900;">${c.make} ${c.model}</div><div style="color:var(--fh-yellow); font-weight:900;">${c.class} ${c.pi}</div>`;
                list.appendChild(card);
            });
        }

        function selectGame(g) {
            state.game = g;
            document.getElementById('game-label').innerText = g;
            document.getElementById('fx-layer').style.display = 'block';
            setTimeout(() => { document.getElementById('fx-layer').style.display = 'none'; }, 500);
            toggleGameMenu(); save(); render();
        }

        function toggleGameMenu() { document.getElementById('game-dropdown').classList.toggle('show'); }

        let tutorStep = 0;
        const tutorData = [
            { id: 'tutor-game', text: "Switch between FH4, FH5, and FH6 here!" },
            { id: 'car-card-1', text: "Tap the dots on any car to add it to your collection." },
            { id: 'tutor-settings', text: "Manage your profile or reset the tour in Settings." }
        ];

        function startTutorial() {
            document.getElementById('tutor-box').style.display = 'block';
            nextTutor();
        }

        function nextTutor() {
            tutorData.forEach(d => document.getElementById(d.id)?.classList.remove('tutor-highlight'));
            const step = tutorData[tutorStep];
            document.getElementById(step.id).classList.add('tutor-highlight');
            document.getElementById('tutor-text').innerText = step.text;
        }

        function advanceTutorial() {
            tutorStep++;
            if(tutorStep >= tutorData.length) {
                document.getElementById('tutor-box').style.display = 'none';
                tutorData.forEach(d => document.getElementById(d.id).classList.remove('tutor-highlight'));
                state.tutorialSeen = true; save();
            } else { nextTutor(); }
        }

        function openCar(id) {
            const car = cars.find(c => c.id === id);
            document.getElementById('modal-title').innerText = `${car.make} ${car.model}`;
            document.getElementById('modal-car').style.display = 'flex';
            document.getElementById('own-btn').onclick = () => {
                if(state.owned.includes(id)) state.owned = state.owned.filter(i => i !== id);
                else state.owned.push(id);
                save(); render(); closeModals();
            };
        }

        function closeModals() { document.getElementById('modal-car').style.display = 'none'; }
        function save() { localStorage.setItem('fh_v24_save', JSON.stringify(state)); }
    </script>
</body>
