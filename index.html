<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Forza Garage V20 | Adaptive Edition</title>
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@700&family=Inter:wght@400;900&display=swap" rel="stylesheet">
    <style>
        :root { --fh-pink: #ff2d55; --fh-yellow: #f2d638; --bg-carbon: #0a0a0c; --glass: rgba(255, 255, 255, 0.1); }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: var(--bg-carbon); color: white; font-family: 'Inter', sans-serif; overflow: hidden; }

        /* --- ADAPTIVE BACKGROUND --- */
        #master-bg { position: fixed; inset: 0; z-index: -1; background-image: url('IMG_4135.png'); background-size: cover; background-position: center; filter: brightness(0.5); transition: 1.5s ease-in-out; }
        
        /* --- ENVIRONMENTAL ANIMATIONS --- */
        #fx-canvas { position: fixed; inset: 0; pointer-events: none; z-index: 4000; }

        /* --- FORZA GREETING --- */
        .overlay-screen { position: fixed; inset: 0; background: rgba(0,0,0,0.98); z-index: 5000; display: none; flex-direction: column; align-items: center; justify-content: center; padding: 20px; text-align: center; }
        .forza-flash { font-family: 'Oswald', sans-serif; font-size: 3.5rem; font-style: italic; text-transform: uppercase; transform: skewX(-10deg); animation: flashIn 2s ease-out forwards; }
        @keyframes flashIn { 0% { opacity: 0; transform: scale(0.8) skewX(-10deg); } 30% { opacity: 1; transform: scale(1) skewX(-10deg); color: var(--fh-yellow); } 100% { opacity: 0; transform: scale(1.1) skewX(-10deg); } }

        /* --- HEADER & SEARCH (ADAPTIVE GLASS) --- */
        .header { padding: 15px; background: rgba(0,0,0,0.7); backdrop-filter: blur(15px); border-bottom: 3px solid var(--fh-pink); position: relative; z-index: 1001; }
        .top-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .user-title { font-family: 'Oswald', sans-serif; font-size: 1.6rem; color: var(--fh-yellow); font-style: italic; text-transform: uppercase; }
        
        .search-bar { width: 100%; display: flex; gap: 8px; margin-top: 10px; }
        .search-input { flex: 1; padding: 10px; border-radius: 12px; border: 1px solid var(--glass); background: var(--glass); color: white; }
        .sort-btn { padding: 10px; background: var(--fh-pink); border: none; border-radius: 12px; color: white; font-weight: 900; }

        /* --- CAR CARDS (ROUNDED GLASS) --- */
        .list-container { height: 65vh; overflow-y: auto; padding: 15px 15px 150px; }
        .car-card { background: var(--glass); backdrop-filter: blur(10px); border-radius: 20px; margin-bottom: 15px; padding: 20px; border: 1px solid rgba(255,255,255,0.1); filter: grayscale(1) opacity(0.5); transition: 0.4s; }
        .car-card.owned { filter: grayscale(0) opacity(1); border: 2px solid var(--fh-pink); }

        /* --- TUTORIAL HIGHLIGHT --- */
        .tutor-highlight { border: 4px solid var(--fh-yellow) !important; box-shadow: 0 0 20px var(--fh-yellow); z-index: 6000; }
        
        /* --- MODALS --- */
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 9000; display: none; flex-direction: column; padding: 40px 20px; }
        .modal.active { display: flex; }
        .btn-main { width: 100%; padding: 20px; background: var(--fh-pink); border-radius: 15px; border: none; color: white; font-weight: 900; margin-top: 15px; }
    </style>
</head>
<body>

    <div id="master-bg"></div>
    <canvas id="fx-canvas"></canvas>

    <div id="step-name" class="overlay-screen">
        <h1 style="font-family:'Oswald'; color:var(--fh-yellow);">FORZA GARAGE</h1>
        <input type="text" id="input-name" class="search-input" style="width:80%;" placeholder="DRIVER NAME">
        <button onclick="nextStartup(1)" class="btn-main" style="width:80%;">START ENGINE</button>
    </div>

    <div id="step-dlc" class="overlay-screen">
        <h2 style="font-family:'Oswald';">OWNED EXPANSIONS?</h2>
        <div style="text-align:left; margin:20px 0;">
            <label><input type="checkbox" id="check-lego"> FH4: LEGO Champions</label><br><br>
            <label><input type="checkbox" id="check-hw"> FH5: Hot Wheels</label>
        </div>
        <button onclick="nextStartup(2)" class="btn-main">CONTINUE</button>
    </div>

    <div id="step-alert" class="overlay-screen">
        <div style="background:#222; border:3px solid var(--fh-pink); border-radius:20px; padding:30px; position:relative;">
            <div style="position:absolute; right:15px; top:15px; color:var(--fh-pink); font-weight:900; cursor:pointer;" onclick="startTutorialFlow()">X</div>
            <h3 style="color:var(--fh-yellow);">COLLECTION NOTE</h3>
            <p>This list defaults to the BASE GAME. DLCs can be toggled in settings.</p>
        </div>
    </div>

    <div id="step-tutor" class="overlay-screen">
        <h2 style="font-family:'Oswald';">WANT A TOUR?</h2>
        <button onclick="runTutorial()" class="btn-main">YES, SHOW ME AROUND</button>
        <button onclick="finishOnboarding()" class="btn-main" style="background:#444;">SKIP FOR NOW</button>
    </div>

    <div class="header">
        <div class="top-row">
            <div id="tutor-game" class="sort-btn" style="background:#222; border:1px solid #444;" onclick="toggleGameMenu()">▣ <span id="game-label">FH5</span></div>
            <div class="user-title" id="name-display">COREYUM</div>
            <div id="tutor-settings" style="font-size:1.8rem; cursor:pointer;" onclick="openSettings()">⚙️</div>
        </div>
        <div class="search-bar" id="tutor-search">
            <input type="text" class="search-input" placeholder="Search Cars..." oninput="handleSearch(this.value)">
            <button class="sort-btn" onclick="toggleSort()">SORT ▼</button>
        </div>
        <div id="game-pop" style="display:none; position:absolute; left:15px; top:110px; background:rgba(0,0,0,0.9); border-radius:15px; z-index:2005;">
            <div style="padding:15px; border-bottom:1px solid #333" onclick="swapGame('FH4')">FH4 (Autumn)</div>
            <div style="padding:15px; border-bottom:1px solid #333" onclick="swapGame('FH5')">FH5 (Piñata)</div>
            <div style="padding:15px" onclick="swapGame('FH6')">FH6 (Neon)</div>
        </div>
    </div>

    <div class="list-container" id="car-list"></div>

    <script>
        let state = JSON.parse(localStorage.getItem('fh_v20')) || { 
            name: "", onboarding: true, firstTime: true, game: 'FH5', owned: [], dlcs: [],
            bgs: { FH4: 'IMG_4135.png', FH5: 'IMG_4135.png', FH6: 'IMG_4135.png' }
        };

        const carDatabase = [
            { id: 1, make: "Porsche", model: "911 GT3", pi: 900, class: "S1", value: 150000, year: 2021 },
            { id: 2, make: "Dodge", model: "Charger R/T", pi: 450, class: "B", value: 64000, year: 1969 }
        ];

        function nextStartup(s) {
            if(s === 1) { state.name = document.getElementById('input-name').value || "Driver"; document.getElementById('step-name').style.display = 'none'; document.getElementById('step-dlc').style.display = 'flex'; }
            if(s === 2) { document.getElementById('step-dlc').style.display = 'none'; document.getElementById('step-alert').style.display = 'flex'; }
        }

        function startTutorialFlow() {
            document.getElementById('step-alert').style.display = 'none';
            document.getElementById('step-tutor').style.display = 'flex';
        }

        function runTutorial() {
            document.getElementById('step-tutor').style.display = 'none';
            // Logic to highlight elements one by one
            alert("This is your Game Switcher. Click it to change installments!");
            document.getElementById('tutor-game').classList.add('tutor-highlight');
            setTimeout(() => {
                document.getElementById('tutor-game').classList.remove('tutor-highlight');
                alert("Use this bar to search or sort your garage just like in Forza!");
                document.getElementById('tutor-search').classList.add('tutor-highlight');
                setTimeout(() => {
                    document.getElementById('tutor-search').classList.remove('tutor-highlight');
                    finishOnboarding();
                }, 2000);
            }, 2000);
        }

        function finishOnboarding() {
            state.onboarding = false; save();
            document.querySelectorAll('.overlay-screen').forEach(s => s.style.display = 'none');
            location.reload();
        }

        function swapGame(g) {
            state.game = g;
            document.getElementById('game-label').innerText = g;
            triggerHugeAnimation(g);
            updateList();
        }

        function triggerHugeAnimation(game) {
            const canvas = document.getElementById('fx-canvas');
            // Canvas logic for falling leaves (FH4) or Pinata confetti (FH5)
            console.log("Triggering Huge " + game + " Animation");
        }

        function updateList() {
            const list = document.getElementById('car-list');
            list.innerHTML = '';
            carDatabase.forEach(c => {
                const card = document.createElement('div');
                card.className = `car-card ${state.owned.includes(c.id) ? 'owned' : ''}`;
                card.innerHTML = `<h3>${c.make} ${c.model}</h3><p>${c.class} ${c.pi}</p>`;
                list.appendChild(card);
            });
        }

        function save() { localStorage.setItem('fh_v20', JSON.stringify(state)); }
        window.onload = () => { if(state.onboarding) document.getElementById('step-name').style.display = 'flex'; else updateList(); };
    </script>
</body>
</html>
