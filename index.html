<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Forza Garage | V17 Fixed</title>
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@700&family=Inter:wght@400;900&display=swap" rel="stylesheet">
    <style>
        :root { --fh-pink: #ff2d55; --fh-yellow: #f2d638; --bg-carbon: #0a0a0c; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: var(--bg-carbon); color: white; font-family: 'Inter', sans-serif; overflow: hidden; }

        /* --- THE PORSCHE BACKGROUND (FIXED) --- */
        #master-bg { 
            position: fixed; inset: 0; z-index: -1; 
            background-image: url('IMG_4135.png'), url('IMG_4135.PNG'), url('./IMG_4135.png'); 
            background-size: cover; background-position: center; 
            filter: brightness(0.6); transition: 1s; 
        }

        /* --- HEADER & NAVIGATION --- */
        .header { padding: 15px; background: rgba(0,0,0,0.9); border-bottom: 3px solid var(--fh-pink); position: relative; z-index: 1001; }
        .top-row { display: flex; justify-content: space-between; align-items: center; width: 100%; }
        .user-title { font-family: 'Oswald', sans-serif; font-size: 1.8rem; color: var(--fh-yellow); font-style: italic; text-transform: uppercase; text-align: center; flex-grow: 1; }
        .game-nav { background: #222; padding: 10px; border: 1px solid #444; font-weight: 900; min-width: 80px; text-align: center; cursor: pointer; }
        .settings-btn { font-size: 1.8rem; cursor: pointer; padding-left: 10px; transition: 0.3s; }
        .settings-btn:active { transform: rotate(90deg); }

        /* --- DROP DOWN FOR GAMES --- */
        #game-pop { display: none; position: absolute; left: 15px; top: 70px; background: #222; border: 1px solid #444; z-index: 2005; width: 140px; box-shadow: 0 10px 20px rgba(0,0,0,0.5); }
        .game-opt { padding: 15px; border-bottom: 1px solid #333; cursor: pointer; font-weight: 900; }
        .game-opt:last-child { border: none; }

        /* --- CAR CARDS --- */
        .list-container { height: 75vh; overflow-y: auto; padding: 15px 15px 150px; }
        .car-card { background: rgba(30,30,30,0.8); margin-bottom: 12px; padding: 15px; border-left: 8px solid #444; backdrop-filter: blur(5px); filter: grayscale(1) opacity(0.6); position: relative; }
        .car-card.owned { filter: grayscale(0) opacity(1); border-left-color: var(--fh-pink); background: rgba(0,0,0,0.8); }
        
        .car-row-1 { display: flex; justify-content: space-between; align-items: center; margin-bottom: 5px; }
        .pi-box { display: flex; align-items: center; gap: 8px; }
        .class-tag { color: var(--fh-yellow); font-weight: 900; font-size: 0.9rem; }
        .pi-badge { background: #444; padding: 3px 8px; font-weight: 900; font-size: 0.9rem; }
        .dots-btn { font-size: 1.6rem; color: var(--fh-yellow); padding: 0 5px; cursor: pointer; }

        /* --- MODALS --- */
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.98); z-index: 5000; display: none; flex-direction: column; padding: 40px 20px; }
        .modal.active { display: flex; }
        .close-x { text-align: right; font-size: 2.5rem; font-weight: 900; color: var(--fh-pink); cursor: pointer; margin-bottom: 20px; }
        .action-btn { width: 100%; padding: 18px; background: #222; border: 1px solid #444; color: white; margin-bottom: 15px; font-weight: 900; font-family: 'Oswald'; }
    </style>
</head>
<body>

    <div id="master-bg"></div>

    <div class="header">
        <div class="top-row">
            <div class="game-nav" onclick="toggleGameMenu()">▣ <span id="game-label">FH5</span></div>
            <div class="user-title" id="name-display">COREYUM</div>
            <div class="settings-btn" onclick="openSettings()">⚙️</div>
        </div>
        <div id="game-pop">
            <div class="game-opt" onclick="swapGame('FH4')">FH4</div>
            <div class="game-opt" onclick="swapGame('FH5')">FH5</div>
            <div class="game-opt" onclick="swapGame('FH6')">FH6</div>
        </div>
        <div style="text-align:center; font-size:0.8rem; color:var(--fh-yellow); margin-top:5px; font-weight:900;">
            COLLECTION: <span id="stats">0 / 0</span>
        </div>
    </div>

    <div class="list-container" id="car-list"></div>

    <div id="modal-car" class="modal">
        <div class="close-x" onclick="closeModals()">X</div>
        <h2 id="modal-car-title" style="font-family:'Oswald'; border-bottom:2px solid var(--fh-pink); padding-bottom:10px;">CAR NAME</h2>
        <button class="action-btn" onclick="copySocial()">COPY FOR SOCIAL MEDIA</button>
        <button class="action-btn" id="toggle-own-btn" style="background:var(--fh-pink); color:white; border:none;">ADD TO COLLECTION</button>
    </div>

    <div id="modal-settings" class="modal">
        <div class="close-x" onclick="closeModals()">X</div>
        <h1 style="font-family:'Oswald'; color:var(--fh-yellow);">SETTINGS</h1>
        <p>Change Name:</p>
        <input type="text" id="name-change" class="action-btn" style="text-align:left; background:#111;">
        <button class="action-btn" style="background:var(--fh-pink); border:none;" onclick="saveName()">SAVE NAME</button>
    </div>

    <script>
        let state = JSON.parse(localStorage.getItem('fh_v17_save')) || { 
            name: "COREYUM", game: 'FH5', owned: [] 
        };

        const cars = [
            { id: 1, make: "Porsche", model: "911 GT3", pi: 900, class: "S1", value: "150,000" },
            { id: 2, make: "Toyota", model: "Supra RZ", pi: 620, class: "A", value: "38,000" },
            { id: 3, make: "Dodge", model: "Charger R/T", pi: 450, class: "B", value: "64,000" }
        ];

        let selectedCar = null;

        window.onload = () => {
            document.getElementById('name-display').innerText = state.name;
            swapGame(state.game);
        };

        function toggleGameMenu() {
            const m = document.getElementById('game-pop');
            m.style.display = (m.style.display === 'block') ? 'none' : 'block';
        }

        function swapGame(g) {
            state.game = g;
            document.getElementById('game-label').innerText = g;
            document.getElementById('game-pop').style.display = 'none';
            updateList();
            save();
        }

        function updateList() {
            const list = document.getElementById('car-list');
            list.innerHTML = '';
            cars.forEach(c => {
                const isOwned = state.owned.includes(c.id);
                const card = document.createElement('div');
                card.className = `car-card ${isOwned ? 'owned' : ''}`;
                card.innerHTML = `
                    <div class="car-row-1">
                        <div class="pi-box"><span class="class-tag">${c.class}</span> <span class="pi-badge">${c.pi}</span></div>
                        <div class="dots-btn" onclick="openCarMenu(${c.id})">⋮</div>
                    </div>
                    <div style="font-weight:900; font-size:1.1rem;">${c.make} ${c.model}</div>
                    <div style="font-size:0.8rem; color:#888; margin-top:5px;">${c.value} CR</div>
                `;
                list.appendChild(card);
            });
            document.getElementById('stats').innerText = `${state.owned.length} / ${cars.length}`;
        }

        function openCarMenu(id) {
            selectedCar = cars.find(c => c.id === id);
            const isOwned = state.owned.includes(id);
            document.getElementById('modal-car-title').innerText = `${selectedCar.make} ${selectedCar.model}`;
            document.getElementById('toggle-own-btn').innerText = isOwned ? "REMOVE FROM COLLECTION" : "ADD TO COLLECTION";
            document.getElementById('toggle-own-btn').onclick = () => {
                if(isOwned) state.owned = state.owned.filter(i => i !== id);
                else state.owned.push(id);
                save(); updateList(); closeModals();
            };
            document.getElementById('modal-car').classList.add('active');
        }

        function openSettings() { document.getElementById('modal-settings').classList.add('active'); document.getElementById('name-change').value = state.name; }
        function saveName() { state.name = document.getElementById('name-change').value; document.getElementById('name-display').innerText = state.name; save(); closeModals(); }
        function closeModals() { document.querySelectorAll('.modal').forEach(m => m.classList.remove('active')); }
        function copySocial() { navigator.clipboard.writeText(`Look at my ${selectedCar.make} ${selectedCar.model}!`); alert("Copied!"); }
        function save() { localStorage.setItem('fh_v17_save', JSON.stringify(state)); }
    </script>
</body>
</html>
