<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Forza Foundation | V14</title>
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@700&family=Inter:wght@400;900&display=swap" rel="stylesheet">
    <style>
        :root { --fh-pink: #ff2d55; --fh-yellow: #f2d638; --bg-carbon: #0a0a0c; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: var(--bg-carbon); color: white; font-family: 'Inter', sans-serif; overflow: hidden; }

        /* --- THE PORSCHE CHECK --- */
        #master-bg { 
            position: fixed; 
            inset: 0; 
            z-index: -1; 
            background-image: url('IMG_4135.png'), url('IMG_4135.PNG'); /* Covers both lower and uppercase */
            background-size: cover; 
            background-position: center; 
            filter: brightness(0.7); /* Lightened from 0.4 to 0.7 so the photo pops */
            transition: 1s; 
        }

        /* --- UI OVERLAY --- */
        .header { padding: 15px; background: rgba(0,0,0,0.8); border-bottom: 3px solid var(--fh-pink); z-index: 1001; position: relative; }
        .top-row { display: flex; justify-content: space-between; align-items: center; }
        .user-title { font-family: 'Oswald', sans-serif; font-size: 1.8rem; color: var(--fh-yellow); font-style: italic; text-transform: uppercase; flex: 1; text-align: center; text-shadow: 2px 2px 5px black; }
        .game-nav { background: #222; padding: 10px; border: 1px solid #444; font-weight: 900; }

        .list-container { height: 75vh; overflow-y: auto; padding: 10px 15px 150px; }
        .car-card { background: rgba(0,0,0,0.7); margin-bottom: 10px; padding: 20px; display: flex; align-items: center; border-left: 8px solid #444; backdrop-filter: blur(4px); border-radius: 4px; }
        .car-card.owned { border-left-color: var(--fh-pink); background: rgba(255,45,85,0.3); }
        .pi-badge { background: #333; padding: 8px; margin-right: 15px; font-weight: 900; min-width: 60px; text-align: center; border: 1px solid #555; }
    </style>
</head>
<body>

    <div id="master-bg"></div>

    <div class="header">
        <div class="top-row">
            <div class="game-nav">▣ <span id="game-label">FH5</span></div>
            <div class="user-title" id="name-display">COREYUM</div>
            <div style="font-size:1.8rem;">⚙️</div>
        </div>
        <div style="text-align:center; font-size:0.9rem; color:var(--fh-yellow); margin-top:5px; font-weight:900; letter-spacing: 1px;">
            COLLECTION: <span id="stats">0 / 0</span>
        </div>
    </div>

    <div class="list-container" id="car-list"></div>

    <script>
        let state = JSON.parse(localStorage.getItem('fh_v14_state')) || { name: "COREYUM", owned: [] };
        const cars = [
            { id: 1, name: "911 GT3", make: "Porsche", pi: 900 },
            { id: 2, name: "Charger R/T", make: "Dodge", pi: 450 }
        ];

        window.onload = () => {
            document.getElementById('name-display').innerText = state.name;
            update();
        };

        function update() {
            const list = document.getElementById('car-list');
            list.innerHTML = '';
            cars.forEach(c => {
                const isOwned = state.owned.includes(c.id);
                const card = document.createElement('div');
                card.className = `car-card ${isOwned ? 'owned' : ''}`;
                card.innerHTML = `<div class="pi-badge">${c.pi}</div><div><b>${c.make}</b> ${c.name}</div>`;
                card.onclick = () => {
                    if(!isOwned) state.owned.push(c.id);
                    else state.owned = state.owned.filter(id => id !== c.id);
                    localStorage.setItem('fh_v14_state', JSON.stringify(state));
                    update();
                };
                list.appendChild(card);
            });
            document.getElementById('stats').innerText = `${state.owned.length} / ${cars.length}`;
        }
    </script>
</body>
</html>
